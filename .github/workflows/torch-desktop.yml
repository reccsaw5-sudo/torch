# Torch 桌面客户端在线打包(手动触发)。
#
# 产物:mac(Apple 芯片 + Intel)、Windows(64 位 + 32 位)、Linux 安装包。
# 未签名(按既定方案),用户首次打开需在系统里放行。
#
# 运行内核(选项 1):客户端首次启动时,从"上游公共仓库"下载并安装 Hermes
# 运行时。本工作流把内核固定到 runtime_ref 解析出的真实上游 commit,所以你的
# 私有 fork 不需要公开。runtime_ref 默认 main,如首启不兼容可改成某个上游 tag。
name: torch-desktop

on:
  workflow_dispatch:
    inputs:
      runtime_ref:
        description: "上游运行时分支或 tag(客户端首启下载的 Hermes 内核版本)"
        default: "main"
        required: true
      platforms:
        description: "要构建的平台(逗号分隔,如 mac-arm64,win-x64;留空=全部)"
        default: ""
        required: false

jobs:
  # 根据 platforms 输入动态生成矩阵(job 级 if 里不能用 matrix,所以在这里筛)。
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: pick
        shell: bash
        env:
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: python3 .github/scripts/torch_pick_matrix.py

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve runtime commit (from Gitee mirror)
        shell: bash
        run: |
          # 从 Gitee 镜像解析 commit,保证客户端固定的 commit 一定在 Gitee 里
          # (客户端首启从 Gitee 下 install 脚本、clone 内核)。
          REF="${{ github.event.inputs.runtime_ref }}"
          REF="${REF:-main}"
          SHA=$(git ls-remote https://gitee.com/Gitsongsong/hermes-agent.git "$REF" | awk '{print $1}' | head -n1)
          if [ -z "$SHA" ]; then echo "无法从 Gitee 镜像解析 ref: $REF(检查镜像是否已同步该分支)"; exit 1; fi
          echo "TORCH_RUNTIME_COMMIT=$SHA" >> "$GITHUB_ENV"
          echo "TORCH_RUNTIME_BRANCH=$REF" >> "$GITHUB_ENV"
          echo "运行内核固定到(Gitee): $REF -> $SHA"

      - name: Install deps (workspace root)
        run: npm ci

      - name: Build & package
        working-directory: apps/desktop
        shell: bash
        env:
          # 未签名:关闭 mac 证书自动发现,notarize 无凭据会自动跳过。
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run build
          npm run builder -- ${{ matrix.args }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: torch-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm

  # 所有平台构建完成后,把安装包直传腾讯 COS 并写 manifest.json。
  # COS 密钥用仓库 Secrets(方式 B):COS_SECRET_ID / COS_SECRET_KEY /
  # COS_BUCKET / COS_REGION;可选变量 vars.COS_BASE_URL(自定义域名/CDN)。
  # 没配 COS 时自动跳过(仍可从本次运行 Artifacts 手动下载)。
  publish-cos:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for publish script)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to Tencent COS + write manifest
        shell: bash
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_BASE_URL: ${{ vars.COS_BASE_URL }}
          # GitHub runner 在境外,往国内 COS 直传大安装包会跨境限速超时。
          # 在桶上开启「全球加速」并把此变量设为 true,coscmd 走加速域名上传。
          COS_USE_ACCELERATE: ${{ vars.COS_USE_ACCELERATE }}
        run: |
          if [ -z "$COS_SECRET_ID" ] || [ -z "$COS_BUCKET" ]; then
            echo "COS 未配置(缺少 Secrets),跳过上传。安装包仍可从本次运行的 Artifacts 下载。"
            exit 0
          fi
          python -m pip install --quiet coscmd
          # -m 10:多线程分片上传,提高跨境上传吞吐与容错。
          # 全球加速:coscmd 通过 endpoint 走加速域名 cos.accelerate.myqcloud.com
          # (与 -r region 互斥)。GitHub runner 在境外,开加速后传国内桶才不会超时。
          if [ "$COS_USE_ACCELERATE" = "true" ] || [ "$COS_USE_ACCELERATE" = "1" ]; then
            echo "已启用 COS 全球加速上传(endpoint=cos.accelerate.myqcloud.com)。"
            coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -e cos.accelerate.myqcloud.com -m 10
          else
            coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION" -m 10
          fi
          python .github/scripts/torch_publish_cos.py
