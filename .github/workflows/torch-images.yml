# Torch 部署镜像自动构建:push 到 main(或手动触发)即构建 torch-server 与
# edge(admin-ui + caddy)两个镜像并推送到阿里云 ACR。服务器随后用
# deploy/docker-compose.registry.yml 拉取运行。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置:
#   ACR_USERNAME  阿里云 ACR 用户名(账号全名 / RAM 用户)
#   ACR_PASSWORD  阿里云 ACR 访问密码(在 ACR 控制台设置)
# 可选(Variables,不填用默认):
#   IMAGE_REPO    默认 registry.cn-shanghai.aliyuncs.com/gongyong1/hermes
name: torch-images

on:
  push:
    branches: [main]
    paths:
      - "torch-server/**"
      - "torch-admin-ui/**"
      - "deploy/Caddy.Dockerfile"
      - "deploy/Caddyfile"
      - ".github/workflows/torch-images.yml"
  workflow_dispatch:

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE_REPO: ${{ vars.IMAGE_REPO || 'registry.cn-shanghai.aliyuncs.com/gongyong1/hermes' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push torch-server
        uses: docker/build-push-action@v6
        with:
          context: ./torch-server
          file: ./torch-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:torch-server
            ${{ env.IMAGE_REPO }}:torch-server-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push edge (admin-ui + caddy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Caddy.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:edge
            ${{ env.IMAGE_REPO }}:edge-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
